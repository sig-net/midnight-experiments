# node-modules linker is required: the @midnight-ntwrk wasm/native packages
# need a real hoisted node_modules tree (PnP would break them).
nodeLinker: node-modules

enableTelemetry: false

# Native/wasm deps (esbuild, classic-level, msgpackr-extract) rely on their
# install scripts; keep them enabled even if a machine-global yarnrc turns
# them off.
enableScripts: true

# Our own packages are trusted at any age: without this, the 24h
# npmMinimalAgeGate quarantines every fresh @sig-net release and installs
# fail until a day after each publish.
npmScopes:
  sig-net:
    npmMinimalAgeGate: 0
